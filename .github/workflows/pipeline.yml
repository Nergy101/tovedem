name: 🚀 Deploy Angular App

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Force Deploy"
        required: true
        type: boolean
        default: false
  push:
    branches: ["main"]

jobs:
  # Stage: build-and-push
  build-angular-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm run test
      - name: Build Angular App
        run: npm run build:prod
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: dist/

  build-and-push-docker-image:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    needs: build-angular-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Get app version
        run: echo "APP_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.cd
          push: true
          tags: |
            nergy101/tovedem:latest
            nergy101/tovedem:${{ env.APP_VERSION }}
          platforms: linux/arm64,linux/amd64

  # Stage: deploy
  nergy-acceptance-deploy:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest
    environment: Nergy Acceptance
    steps:
      - name: Get Known Hosts value
        run: echo "KNOWN_HOSTS=$(ssh-keyscan -H ${{ secrets.SSH_HOST }})" >> $GITHUB_ENV
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: github-actions
          known_hosts: ${{ env.KNOWN_HOSTS }}
          if_key_exists: replace
      - name: Deploy Docker Image to VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/code/tovedem
            docker compose pull
            docker compose up -d

  # Stage: deploy (VM 2)
  tovedem-production-deploy:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest
    environment: Tovedem Production
    steps:
      - name: Get Known Hosts value
        run: echo "KNOWN_HOSTS=$(ssh-keyscan -H ${{ secrets.SSH_HOST_2 }})" >> $GITHUB_ENV
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY_2 }}
          name: github-actions
          known_hosts: ${{ env.KNOWN_HOSTS }}
          if_key_exists: replace
      - name: Deploy Docker Image to VM 2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_2 }}
          username: ${{ secrets.SSH_USERNAME_2 }}
          key: ${{ secrets.SSH_KEY_2 }}
          script: |
            cd /root/code/tovedem
            docker compose pull
            docker compose up -d
