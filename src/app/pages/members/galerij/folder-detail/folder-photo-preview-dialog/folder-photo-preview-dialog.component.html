<div class="container">
  <mat-dialog-content class="d-flex justify-content-center align-items-center">
    <img
      [src]="getFileUrl()"
      alt="Foto in volledig scherm"
      (load)="onImageLoaded()"
    />

    @if (loading) {
    <mat-spinner aria-label="Afbeelding wordt geladen"></mat-spinner>
    }
  </mat-dialog-content>

  @if (!loading) {
  <mat-dialog-actions class="actions actions-bar">
    <button mat-button (click)="onLeftArrowDown()" aria-label="Vorige foto" class="action-btn">
      <mat-icon aria-hidden="true">arrow_back</mat-icon>
      <span class="action-label">Vorige</span>
      <span class="action-label-long">Vorige - pijltjes toets naar links</span>
    </button>
    <button
      mat-button
      mat-dialog-close
      (click)="onEscapeDown()"
      aria-label="Sluit foto weergave"
      class="action-btn"
    >
      <mat-icon aria-hidden="true">close</mat-icon>
      <span class="action-label">Sluiten</span>
      <span class="action-label-long">Sluiten - escape toets</span>
    </button>
    <button
      mat-button
      (click)="onEnterDown()"
      aria-label="Open foto in nieuw tabblad"
      class="action-btn"
    >
      <mat-icon aria-hidden="true">open_in_new</mat-icon>
      <span class="action-label">Openen</span>
      <span class="action-label-long">Openen - enter toets</span>
    </button>
    <button mat-button (click)="onRightArrowDown()" aria-label="Volgende foto" class="action-btn">
      <mat-icon aria-hidden="true">arrow_forward</mat-icon>
      <span class="action-label">Volgende</span>
      <span class="action-label-long">Volgende - pijltjes toets naar rechts</span>
    </button>
  </mat-dialog-actions>
  }
</div>
