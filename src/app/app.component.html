<a href="#main-content" class="skip-to-content" (click)="skipToMainContent()"
  >Spring naar hoofdinhoud</a
>
<a href="#navbar" class="skip-to-content" (click)="skipToNavigation()"
  >Spring naar navigatie</a
>
<a href="#footer" class="skip-to-content" (click)="skipToFooter()"
  >Spring naar footer</a
>
<header>
  <div
    class="demo-alert"
    [class.demo-alert--expanded]="demoAlertExpanded"
    (click)="toggleDemoAlert()"
    role="button"
    tabindex="0"
    (keydown.enter)="toggleDemoAlert()"
    (keydown.space)="toggleDemoAlert(); $event.preventDefault()"
  >
    <mat-icon class="demo-alert__icon" aria-hidden="true">info</mat-icon>
    <span class="demo-alert__text">
      Welkom in de eerste versie van de nieuwe Tovedem website. Reserveer hier
      je tickets voor de voorstellingen.
      <a
        href="https://www.tovedem.nl/"
        target="_blank"
        (click)="$event.stopPropagation()"
        >Klik hier</a
      >
      om terug te gaan naar de originele website.
    </span>
  </div>
  <nav id="navbar">
    <app-navbar></app-navbar>
  </nav>
</header>

<mat-drawer-container
  class="custom-bg"
  autosize
  [hasBackdrop]="!breakpointService.isDesktopScreen()"
  (backdropClick)="sideDrawerService.close()"
>
  <mat-drawer
    #drawer
    class="sidenav custom-bg sidenav-mobile-home"
    [mode]="breakpointService.isDesktopScreen() ? 'side' : 'over'"
  >
    <div class="drawer-content">
      <app-sidenav></app-sidenav>
    </div>
  </mat-drawer>

  <div class="page-shell">
    <div class="router-content" id="main-content" tabindex="-1">
      <router-outlet />
    </div>
    <footer id="footer" class="container-fluid">
      <app-footer></app-footer>
    </footer>
  </div>
</mat-drawer-container>

<app-cookie-banner></app-cookie-banner>
